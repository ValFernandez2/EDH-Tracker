<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commander Tracker</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
<h2 class="sr-only">EDH Commander Tracker</h2>

<!-- ── Auth screen (injected by auth.js) ── -->
<div id="auth-screen" style="display:none;"></div>

<!-- ── Playgroup screen (injected by auth.js) ── -->
<div id="pg-screen" style="display:none;"></div>

<!-- ── Main app shell ── -->
<div id="app-shell" class="app" style="display:none;">

  <div class="header">
    <div style="display:flex;align-items:center;gap:10px;">
      <div>
        <div class="app-title">Commander Tracker</div>
        <div id="header-pg" class="app-sub"></div>
      </div>
    </div>
    <div id="header-user" style="display:flex;align-items:center;gap:8px;"></div>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="showTab('decks')">Mazos</button>
    <button class="nav-btn" onclick="showTab('match')">Partida</button>
    <button class="nav-btn" onclick="showTab('history')">Historial</button>
    <button class="nav-btn" onclick="showTab('stats')">Estadísticas</button>
    <button class="nav-btn" onclick="showTab('tournament')">Torneos</button>
    <button class="nav-btn" onclick="showTab('playgroups')">Playgroups</button>
  </div>

  <div id="tab-decks"      class="section active tab-content-scroll"></div>
  <div id="tab-match"      class="section tab-content-scroll"></div>
  <div id="tab-history"    class="section tab-content-scroll"></div>
  <div id="tab-stats"      class="section tab-content-scroll"></div>
  <div id="tab-tournament" class="section tab-content-scroll"></div>

  <div id="modal-overlay">
    <div id="modal-box"></div>
  </div>
</div>

<!-- auth.js boots first, then loads app.js -->
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
