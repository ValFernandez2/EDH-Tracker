<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Commander Tracker</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body> 
<h2 class="sr-only">EDH Commander Tracker — mazos, partidas, torneos y tabla de posiciones</h2>

<div class="app">
  <div class="header">
    <div>
      <div class="app-title">Commander Tracker</div>
      <div class="app-sub">EDH / Commander Format</div>
    </div>
    <div style="display:flex;gap:6px;align-items:center;">
      <button class="btn btn-sm" onclick="showPlayersModal()">Jugadores</button>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="showTab('decks')">Mazos</button>
    <button class="nav-btn" onclick="showTab('match')">Partida</button>
    <button class="nav-btn" onclick="showTab('history')">Historial</button>
    <button class="nav-btn" onclick="showTab('stats')">Estadísticas</button>
    <button class="nav-btn" onclick="showTab('tournament')">Torneos</button>
  </div>

  <div id="tab-decks" class="section active tab-content-scroll"></div>
  <div id="tab-match" class="section tab-content-scroll"></div>
  <div id="tab-history" class="section tab-content-scroll"></div>
  <div id="tab-stats" class="section tab-content-scroll"></div>
  <div id="tab-tournament" class="section tab-content-scroll"></div>
</div>

<div id="modal-overlay" style="display:none;position:relative;min-height:260px;background:rgba(0,0,0,0.45);border-radius:var(--border-radius-lg);margin-bottom:1rem;align-items:center;justify-content:center;">
  <div id="modal-box" style="background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:1.25rem;width:92%;max-width:420px;max-height:480px;overflow-y:auto;"></div>
</div>

  
  <script type="module" src="js/firebase.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
